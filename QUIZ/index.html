<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUIZ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h1>Quis Simple</h1>
      <hr />

      <div class="qst active">
        <!-- qst1 -->
        <p><strong>1. Quelle est la capitale de la France?</strong></p>
        <button class="choice">London</button>
        <button class="choice">Paris</button>
        <button class="choice">Berlin</button>
        <button class="choice">Madrid</button>
      </div>
      <div class="qst">
        <!-- qst2 -->
        <p>2. Quel langage est utilisé pour le style des pages web ?</p>
        <button class="choice">HTML</button>
        <button class="choice">CSS</button>
        <button class="choice">Java</button>
        <button class="choice">Python</button>
      </div>

      <div class="qst">
        <!-- qst3 -->
        <p>3. Quel symbole est utilisé pour les commentaires en CSS ?</p>
        <button class="choice">// commentaire</button>
        <button class="choice">&lt;!-- commentaire --&gt;</button>
        <button class="choice">/* commentaire */</button>
        <button class="choice"># commentaire</button>
      </div>
      <div class="qst">
        <!-- Q4 -->
        <p>4. Quelle balise HTML est utilisée pour un lien ?</p>
        <button class="choice">&lt;link&gt;</button>
        <button class="choice">&lt;a&gt;</button>
        <button class="choice">&lt;href&gt;</button>
        <button class="choice">&lt;url&gt;</button>
      </div>
      <p id="end" class="end">Quiz terminé 🎉</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
